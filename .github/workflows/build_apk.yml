name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK using Docker with expect
      run: |
        # 创建一个expect脚本来自动处理Buildozer的交互
        cat > build.sh << 'EOF'
        #!/bin/bash
        docker run --rm -v $(pwd):/app -w /app --user root kivy/buildozer:latest bash -c "
          apt-get update && apt-get install -y expect
          cat > build.exp << 'EXPECTEOF'
          #!/usr/bin/expect -f
          set timeout -1
          spawn buildozer android debug
          expect \"Are you sure you want to continue $$y/n$$?\" {send \"y\r\"}
          expect eof
          EXPECTEOF
          chmod +x build.exp
          ./build.exp
        "
        EOF
        chmod +x build.sh
        ./build.sh

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
