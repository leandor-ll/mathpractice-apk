name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_BUILD_TOOLS_VERSION: 31.0.0
      ANDROID_PLATFORM_VERSION: 31

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
            build-essential \
            git \
            curl \
            wget \
            unzip \
            openjdk-11-jdk \
            zipalign \
            apksigner \
            lib32z1 \
            lib32stdc++6 \
            libgl1-mesa-glx \
            libx11-xcb1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 kivy==2.1.0

    - name: Create buildozer directory structure
      run: |
        mkdir -p ~/.buildozer/android/platform
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools

    - name: Download and setup Android SDK
      run: |
        # 下载SDK命令行工具
        wget -O sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip sdk-tools.zip -d ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mv ~/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        rm sdk-tools.zip

    - name: Create symlinks for sdkmanager
      run: |
        # 创建符号链接，确保Buildozer能找到sdkmanager
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/avdmanager ~/.buildozer/android/platform/android-sdk/tools/bin/avdmanager

    - name: Accept Android SDK licenses
      run: |
        # 接受所有许可证
        echo "y" | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${{ env.ANDROID_HOME }} --licenses
        # 安装必要的SDK组件
        echo "y" | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${{ env.ANDROID_HOME }} \
          "platform-tools" \
          "platforms;android-${{ env.ANDROID_PLATFORM_VERSION }}" \
          "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"

    - name: Verify build-tools installation
      run: |
        # 验证build-tools是否正确安装
        ls -la ~/.buildozer/android/platform/android-sdk/build-tools/
        # 如果build-tools目录为空，手动下载并安装
        if [ -z "$(ls -A ~/.buildozer/android/platform/android-sdk/build-tools/)" ]; then
          wget -O build-tools.zip https://dl.google.com/android/repository/build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-linux.zip
          unzip build-tools.zip -d ~/.buildozer/android/platform/android-sdk/build-tools/
          rm build-tools.zip
        fi

    - name: Build APK
      run: |
        # 设置环境变量
        export ANDROID_HOME=${{ env.ANDROID_HOME }}
        export ANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }}
        
        # 构建APK
        buildozer android debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
