name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_BUILD_TOOLS_VERSION: 31.0.0
      ANDROID_PLATFORM_VERSION: 31

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
            build-essential \
            git \
            curl \
            wget \
            unzip \
            openjdk-11-jdk \
            zipalign \
            apksigner \
            lib32z1 \
            lib32stdc++6 \
            libgl1-mesa-glx \
            libx11-xcb1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Create buildozer directory
      run: |
        mkdir -p ~/.buildozer/android/platform

    - name: Download and setup Android SDK
      run: |
        # 下载SDK
        wget -O android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        
        # 创建正确的目录结构
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        unzip android-sdk.zip -d ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mv ~/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        rm android-sdk.zip

    - name: Create symlink for sdkmanager
      run: |
        # 创建旧路径的符号链接，确保Buildozer能找到sdkmanager
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/avdmanager ~/.buildozer/android/platform/android-sdk/tools/bin/avdmanager

    - name: Accept Android SDK licenses
      run: |
        # 使用--sdk_root参数明确指定SDK根目录
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${{ env.ANDROID_HOME }} --licenses
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${{ env.ANDROID_HOME }} "platform-tools" "platforms;android-${{ env.ANDROID_PLATFORM_VERSION }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"

    - name: Update PATH
      run: |
        echo "export PATH=\$PATH:${{ env.ANDROID_HOME }}/platform-tools" >> ~/.bashrc
        echo "export PATH=\$PATH:${{ env.ANDROID_HOME }}/cmdline-tools/latest/bin" >> ~/.bashrc
        echo "export PATH=\$PATH:${{ env.ANDROID_HOME }}/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}" >> ~/.bashrc
        source ~/.bashrc

    - name: Build APK
      run: |
        buildozer android debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
