name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK using Docker
      run: |
        # 使用预构建的Buildozer Docker镜像，以root身份运行并自动回答确认
        docker run --rm -v $(pwd):/app -w /app --user root kivy/buildozer:latest bash -c "
          echo 'y' | buildozer android debug
        "

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
