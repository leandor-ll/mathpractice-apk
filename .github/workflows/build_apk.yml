name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
            build-essential \
            git \
            curl \
            wget \
            unzip \
            openjdk-11-jdk \
            zipalign \
            apksigner \
            lib32z1 \
            lib32stdc++6 \
            expect

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 kivy==2.1.0

    - name: Create build directory
      run: |
        mkdir -p ~/.buildozer/android/platform

    - name: Download and setup Android SDK
      run: |
        # 下载SDK命令行工具
        wget -O sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip sdk-tools.zip -d ~/.buildozer/android/platform/android-sdk
        mv ~/.buildozer/android/platform/android-sdk/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools-latest
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mv ~/.buildozer/android/platform/android-sdk/cmdline-tools-latest ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        rm sdk-tools.zip

    - name: Create symlinks
      run: |
        # 创建必要的符号链接
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/avdmanager ~/.buildozer/android/platform/android-sdk/tools/bin/avdmanager

    - name: Accept licenses and install components
      run: |
        # 使用expect自动接受许可证
        cat > accept_licenses.exp << 'EOF'
        #!/usr/bin/expect -f
        set timeout -1
        spawn ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=~/.buildozer/android/platform/android-sdk --licenses
        expect {
          "Accept? (y/N):" {send "y\r"; exp_continue}
          eof
        }
        spawn ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=~/.buildozer/android/platform/android-sdk "platform-tools" "platforms;android-31" "build-tools;31.0.0"
        expect {
          "Accept? (y/N):" {send "y\r"; exp_continue}
          eof
        }
        EOF
        chmod +x accept_licenses.exp
        ./accept_licenses.exp

    - name: Build APK
      run: |
        # 设置环境变量
        export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        
        # 构建APK
        buildozer android debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
