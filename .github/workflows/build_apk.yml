name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
            build-essential \
            git \
            curl \
            wget \
            unzip \
            openjdk-11-jdk \
            zipalign \
            apksigner \
            lib32z1 \
            lib32stdc++6 \
            libgl1-mesa-glx \
            libx11-xcb1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Create buildozer directory
      run: |
        mkdir -p ~/.buildozer/android/platform

    - name: Download Android SDK
      run: |
        wget -O android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip android-sdk.zip -d ~/.buildozer/android/platform/android-sdk
        rm android-sdk.zip

    - name: Fix SDK Manager path
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

    - name: Accept Android SDK licenses
      run: |
        echo "y" | ~/.buildozer/android/platform/android-sdk/cmdline-tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        echo "y" | ~/.buildozer/android/platform/android-sdk/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0" > /dev/null 2>&1 || true

    - name: Update PATH
      run: |
        echo "export PATH=\$PATH:~/.buildozer/android/platform/android-sdk/platform-tools" >> ~/.bashrc
        echo "export PATH=\$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/bin" >> ~/.bashrc
        source ~/.bashrc

    - name: Build APK
      run: |
        buildozer android debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
