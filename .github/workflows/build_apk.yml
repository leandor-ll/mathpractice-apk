name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
            build-essential \
            git \
            curl \
            wget \
            unzip \
            openjdk-11-jdk \
            zipalign \
            apksigner \
            lib32z1 \
            lib32stdc++6

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Accept Android SDK licenses
      run: |
        echo "y" | buildozer android debug --verbose 2>&1 | grep -A 10 -B 5 "license" || true

    - name: Build APK
      run: |
        buildozer android debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathpractice-apk
        path: bin/*.apk
